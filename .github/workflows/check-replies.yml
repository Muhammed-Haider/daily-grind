name: Check for reply logs

on:
  schedule:
    # every 3 hours
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check replies
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REPLY_ALIAS: ${{ secrets.REPLY_ALIAS }}
        run: python check_replies.py

      - name: Save progress
        run: |
          git config user.name "daily-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "log new replies"
          git push
